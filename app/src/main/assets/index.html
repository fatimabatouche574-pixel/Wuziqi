<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#191714">
  <title>十九路围棋</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1 class="title">十九路围棋</h1>
        <div id="matchSummary" class="subtitle">标准赛 · 玩家执黑</div>
      </div>
      <div id="turnBadge" class="turn-badge">轮到 <strong>黑棋</strong></div>
    </header>

    <section class="clock-grid" aria-label="双方计时">
      <div id="blackClockCard" class="clock-card active">
        <div class="clock-head"><span class="stone-dot black"></span><span id="blackRole">黑棋 · 玩家</span></div>
        <div id="blackClock" class="clock-value">30:00</div>
        <div id="blackPeriod" class="clock-period">主时间</div>
      </div>
      <div id="whiteClockCard" class="clock-card">
        <div class="clock-head"><span class="stone-dot white"></span><span id="whiteRole">白棋 · 电脑</span></div>
        <div id="whiteClock" class="clock-value">30:00</div>
        <div id="whitePeriod" class="clock-period">主时间</div>
      </div>
    </section>

    <section class="metrics" aria-label="对局信息">
      <div class="metric"><div class="metric-label">当前状态</div><div id="stateValue" class="metric-value">你先行</div></div>
      <div class="metric"><div class="metric-label">提子 黑 : 白</div><div id="captureValue" class="metric-value">0 : 0</div></div>
      <div class="metric"><div class="metric-label">AI 搜索步</div><div id="nodeValue" class="metric-value">0</div></div>
    </section>

    <section class="board-shell">
      <canvas id="board" aria-label="标准十九路围棋棋盘"></canvas>
      <div id="thinkingCover" class="thinking-cover"><div id="thinkingPill" class="thinking-pill">电脑思考中</div></div>
    </section>

    <div class="progress-track" aria-hidden="true"><div id="progressBar" class="progress-bar"></div></div>

    <section class="settings" aria-label="对局设置">
      <label class="field"><span>玩家执子</span><select id="playerColor"><option value="black">执黑先行</option><option value="white">执白后行</option></select></label>
      <label class="field"><span>比赛计时</span><select id="timeControl"><option value="standard">标准 30分＋5×60秒</option><option value="rapid">快棋 10分＋3×30秒</option><option value="long">长考 60分＋5×60秒</option></select></label>
      <label class="field"><span>电脑难度</span><select id="difficulty"><option value="normal">普通难度</option><option value="strong">强势难度</option><option value="crush">碾压难度</option></select></label>
    </section>

    <section class="controls" aria-label="对局控制">
      <button id="passButton" type="button">停一手</button>
      <button id="undoButton" type="button">悔棋</button>
      <button id="hintButton" type="button">落子提示</button>
      <button id="newButton" class="primary" type="button">按当前设置开新局</button>
    </section>

    <section class="status-box" aria-live="polite">
      <div id="message" class="status-line">点击棋盘交叉点落子。</div>
      <div id="detail" class="status-sub">双方独立计时；主时间用尽后进入读秒。</div>
    </section>

    <section id="result" class="result"></section>

    <footer class="legend">
      <span>标准 19×19 棋盘，白贴 7.5 目</span>
      <span>支持提子、禁自杀、简单劫争</span>
      <span>碾压模式按局面与剩余时间动态搜索，单回合上限 3000 步</span>
    </footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
