plugins {
    id 'com.android.application'
}

android {
    namespace 'com.fatima.wuziqi'
    compileSdk 34

    defaultConfig {
        applicationId 'com.fatima.wuziqi'
        minSdk 24
        targetSdk 34
        versionCode 2
        versionName '1.1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
